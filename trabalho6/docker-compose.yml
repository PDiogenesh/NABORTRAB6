version: '3.8'

x-db-env: &db-env
  DATABASE_URL: postgres://music:music123@postgres:5432/musicdb?sslmode=disable

x-py-db-env: &py-db-env
  DATABASE_URL: postgresql://music:music123@postgres:5432/musicdb

services:

  # ── Database ──────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: music_postgres
    environment:
      POSTGRES_DB: musicdb
      POSTGRES_USER: music
      POSTGRES_PASSWORD: music123
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U music -d musicdb"]
      interval: 5s
      timeout: 5s
      retries: 15

  # ── Go Services ───────────────────────────────────────────────
  go-rest:
    build:
      context: .
      dockerfile: go/rest/Dockerfile
    container_name: go_rest
    environment:
      <<: *db-env
      PORT: "8001"
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  go-graphql:
    build:
      context: .
      dockerfile: go/graphql/Dockerfile
    container_name: go_graphql
    environment:
      <<: *db-env
      PORT: "8002"
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy

  go-grpc:
    build:
      context: .
      dockerfile: go/grpc/Dockerfile
    container_name: go_grpc
    environment:
      <<: *db-env
      PORT: "8003"
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy

  go-soap:
    build:
      context: .
      dockerfile: go/soap/Dockerfile
    container_name: go_soap
    environment:
      <<: *db-env
      PORT: "8004"
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Python Services ───────────────────────────────────────────
  python-rest:
    build:
      context: .
      dockerfile: python/rest/Dockerfile
    container_name: python_rest
    environment:
      <<: *py-db-env
      PORT: "8011"
    ports:
      - "8011:8011"
    depends_on:
      postgres:
        condition: service_healthy

  python-graphql:
    build:
      context: .
      dockerfile: python/graphql/Dockerfile
    container_name: python_graphql
    environment:
      <<: *py-db-env
      PORT: "8012"
    ports:
      - "8012:8012"
    depends_on:
      postgres:
        condition: service_healthy

  python-grpc:
    build:
      context: .
      dockerfile: python/grpc/Dockerfile
    container_name: python_grpc
    environment:
      <<: *py-db-env
      PORT: "8013"
    ports:
      - "8013:8013"
    depends_on:
      postgres:
        condition: service_healthy

  python-soap:
    build:
      context: .
      dockerfile: python/soap/Dockerfile
    container_name: python_soap
    environment:
      <<: *py-db-env
      PORT: "8014"
    ports:
      - "8014:8014"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Locust (load testing UI) ──────────────────────────────────
  locust:
    build:
      context: .
      dockerfile: locust/Dockerfile
    container_name: locust
    profiles: ["locust"]
    ports:
      - "8089:8089"
    environment:
      - LOCUST_HOST=${LOCUST_HOST:-http://go-rest:8001}
    volumes:
      - ./locust:/locust
    command: ["-f", "/locust/locustfile_rest.py", "--host", "${LOCUST_HOST:-http://go-rest:8001}"]

volumes:
  pg_data:
